name: ci
# Hallazgo: se dispara en cualquier rama, sin filtro (debería limitarse a main / pull_request).
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m pytest
      # Hallazgo: el pipeline no corre análisis estático (SAST) ni escaneo de secretos.
